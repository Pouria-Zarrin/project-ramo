<script>
(function() {
    // Initialize Icons
    if (typeof lucide !== 'undefined') {
        lucide.createIcons();
    }

    // Initialize Three.js
    function initThreeJS() {
        const container = document.getElementById('canvas-container');
        if (!container) return;
        
        // Clear existing canvas if any (re-init safety)
        while(container.firstChild) {
            container.removeChild(container.firstChild);
        }

        if (typeof THREE === 'undefined') {
            console.error('Three.js not loaded');
            return;
        }

        // Scene Setup
        const scene = new THREE.Scene();
        
        // Camera
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.z = 35; 

        // Renderer
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Group to hold the pill
        const pillGroup = new THREE.Group();
        scene.add(pillGroup);

        // Materials
        const matBrand = new THREE.MeshPhysicalMaterial({
            color: 0x174f57, 
            metalness: 0.1,
            roughness: 0.2,
            clearcoat: 1.0,
            clearcoatRoughness: 0.1
        });

        const matWhite = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            metalness: 0.1,
            roughness: 0.2,
            clearcoat: 1.0,
            clearcoatRoughness: 0.1
        });

        // Geometry
        const radius = 6;
        const tubeHeight = 12; 
        const tubeSegs = 32;

        const topGeo = new THREE.SphereGeometry(radius, 32, 16, 0, Math.PI * 2, 0, Math.PI/2);
        const topCap = new THREE.Mesh(topGeo, matBrand);
        topCap.position.y = tubeHeight / 2;
        pillGroup.add(topCap);

        const topBodyGeo = new THREE.CylinderGeometry(radius, radius, tubeHeight / 2, tubeSegs, 1, true);
        const topBody = new THREE.Mesh(topBodyGeo, matBrand);
        topBody.position.y = tubeHeight / 4;
        pillGroup.add(topBody);

        const botBodyGeo = new THREE.CylinderGeometry(radius, radius, tubeHeight / 2, tubeSegs, 1, true);
        const botBody = new THREE.Mesh(botBodyGeo, matWhite);
        botBody.position.y = -tubeHeight / 4;
        pillGroup.add(botBody);

        const botGeo = new THREE.SphereGeometry(radius, 32, 16, 0, Math.PI * 2, 0, Math.PI/2);
        const botCap = new THREE.Mesh(botGeo, matWhite);
        botCap.rotation.x = Math.PI;
        botCap.position.y = -tubeHeight / 2;
        pillGroup.add(botCap);

        // Particles
        const particleGroup = new THREE.Group();
        scene.add(particleGroup);
        
        const particleMat = new THREE.MeshBasicMaterial({ color: 0x5aaeb8, transparent: true, opacity: 0.6 });
        const particleGeo = new THREE.SphereGeometry(0.3, 8, 8);

        for(let i=0; i<30; i++) {
            const mesh = new THREE.Mesh(particleGeo, particleMat);
            const r = 15 + Math.random() * 10;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.random() * Math.PI;
            mesh.position.x = r * Math.sin(phi) * Math.cos(theta);
            mesh.position.y = r * Math.sin(phi) * Math.sin(theta);
            mesh.position.z = r * Math.cos(phi);
            mesh.userData = {
                speedX: (Math.random() - 0.5) * 0.05,
                speedY: (Math.random() - 0.5) * 0.05,
                speedZ: (Math.random() - 0.5) * 0.05,
                initialPos: mesh.position.clone()
            };
            particleGroup.add(mesh);
        }

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const spotLight = new THREE.SpotLight(0xffffff, 1);
        spotLight.position.set(20, 20, 20);
        scene.add(spotLight);

        const rimLight = new THREE.PointLight(0x174f57, 3, 50);
        rimLight.position.set(-20, 0, -10);
        scene.add(rimLight);
        
        const fillLight = new THREE.PointLight(0x3b82f6, 0.5);
        fillLight.position.set(0, -20, 10);
        scene.add(fillLight);

        // Animation
        let mouseX = 0;
        let mouseY = 0;
        
        pillGroup.rotation.z = Math.PI / 4; 
        pillGroup.rotation.x = Math.PI / 6;

        const animate = () => {
            requestAnimationFrame(animate);

            pillGroup.rotation.y += 0.01;
            pillGroup.position.y = Math.sin(Date.now() * 0.001) * 1;

            particleGroup.rotation.y -= 0.002;
            particleGroup.children.forEach(p => {
                p.position.y += Math.sin(Date.now() * 0.002 + p.position.x) * 0.02;
            });

            const targetRotX = mouseY * 0.5;
            const targetRotY = mouseX * 0.5;
            
            scene.rotation.y += (targetRotY - scene.rotation.y) * 0.05;
            scene.rotation.x += (targetRotX - scene.rotation.x) * 0.05;

            renderer.render(scene, camera);
        };

        animate();

        // Resize Handler
        const handleResize = () => {
            if (!container) return;
            const width = container.clientWidth;
            const height = container.clientHeight;
            renderer.setSize(width, height);
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
        };

        window.addEventListener('resize', handleResize);
        
        // Cleanup if element removed (optional but good for SPAs)
        const observer = new MutationObserver((mutations) => {
            if(!document.body.contains(container)) {
                window.removeEventListener('resize', handleResize);
                observer.disconnect();
            }
        });
        observer.observe(document.body, {childList: true, subtree: true});

        // Mouse Move
        document.addEventListener('mousemove', (e) => {
            const windowHalfX = window.innerWidth / 2;
            const windowHalfY = window.innerHeight / 2;
            mouseX = (e.clientX - windowHalfX) / 1000;
            mouseY = (e.clientY - windowHalfY) / 1000;
        });
    }

    // Run Initialization
    // Check if Three is loaded, if not wait a bit
    const checkThree = setInterval(() => {
        if (typeof THREE !== 'undefined') {
            clearInterval(checkThree);
            initThreeJS();
        }
    }, 100);
    
    // Fallback timeout
    setTimeout(() => clearInterval(checkThree), 5000);

})();
</script>
