        #ramo-header-block .nav-link::after {
            content: '';
            position: absolute;

            width: 0;
            height: 2px;
            background: #0d9488; /* teal-600 */
            transition: width 0.3s ease;
            box-shadow: 0 0 8px rgba(13, 148, 136, 0.3);

        #ramo-header-block .nav-link:hover::after {
            width: 100%;

        /* Primary Button */
        #ramo-header-block .btn-primary {
            background: linear-gradient(135deg, #0d9488 0%, #115e59 100%); /* teal-600 to teal-800 */
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 0.5rem 1.8rem;
            min-height: 46px;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            position: relative;
            overflow: hidden;
        }
        #ramo-header-block .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border-color: rgba(13, 148, 136, 0.3);
        }
        #ramo-header-block .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }
        #ramo-header-block .btn-primary:hover::before {
            left: 100%;
        }

        /* Dropdown Menu */
        #ramo-header-block .dropdown-menu {
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: all 0.2s ease;
        }
        #ramo-header-block .group:hover .dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        /* Language Buttons */
        #ramo-header-block .lang-btn {
            color: #475569; /* slate-600 */
            background: rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.1);

            min-width: 44px;
            min-height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        #ramo-header-block .lang-btn:hover {
            background: rgba(0,0,0,0.1);
            color: #0f172a; /* slate-900 */
        }

        /* Mobile menu button color */
        #ramo-header-block #mobile-menu-btn {
            background: #EFF2F3;

            border-color: transparent;
        }

        #ramo-header-block #mobile-menu-btn:hover {
            background: #e2e8f0; /* slate-200 */
        }
    </style>

    <script>
        // Typing Effect for Holding Name
        document.addEventListener('DOMContentLoaded', function() {
            const holdingText = "هلدینگ خشت دژ ایلیا";
            const holdingElement = document.getElementById('holding-name');
            let charIndex = 0;
            let isDeleting = false;

            function typeWriter() {
                if (!isDeleting) {
                    // Typing effect
                    holdingElement.textContent = holdingText.substring(0, charIndex + 1);
                    charIndex++;

                    if (charIndex === holdingText.length) {
                        // Pause at end of text
                        setTimeout(() => {
                            isDeleting = true;
                        }, 2000);
                    }
                } else {
                    // Deleting effect
                    holdingElement.textContent = holdingText.substring(0, charIndex);
                    charIndex--;

                    if (charIndex < 0) {
                        // Reset for next cycle
                        isDeleting = false;
                        charIndex = 0;
                        setTimeout(typeWriter, 500);
                        return;
                    }
                }

                const speed = isDeleting ? 100 : 150;
                setTimeout(typeWriter, speed);
            }

            // Start the typing effect
            typeWriter();
        });

        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }

        // Mobile Menu Logic
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        let isMenuOpen = false;

        if(mobileMenuBtn && mobileMenu) {
            mobileMenuBtn.addEventListener('click', () => {
                isMenuOpen = !isMenuOpen;
                if(isMenuOpen) {
                    mobileMenu.classList.remove('translate-x-full');
                    // Change icon to X
                    mobileMenuBtn.innerHTML = '<i data-lucide="x" class="w-8 h-8"></i>';
                } else {
                    mobileMenu.classList.add('translate-x-full');
                    // Change icon back to Menu
                    mobileMenuBtn.innerHTML = '<i data-lucide="menu" class="w-8 h-8"></i>';
                }
                if (typeof lucide !== 'undefined') {
                    lucide.createIcons();
                }
            });
        }

        window.toggleMobileSubmenu = function(id) {
            const submenu = document.getElementById(id);
            const icon = document.getElementById('icon-' + id);
            if(submenu.classList.contains('hidden')) {
                submenu.classList.remove('hidden');
                submenu.classList.add('flex');
                icon.style.transform = 'rotate(180deg)';
            } else {
                submenu.classList.add('hidden');
                submenu.classList.remove('flex');
                icon.style.transform = 'rotate(0deg)';
            }
        }

        // Language Toggle Logic
        const langEn = document.getElementById('lang-en');
        const langFa = document.getElementById('lang-fa');
        let currentLang = 'fa';

        langEn.addEventListener('click', () => {
            window.location.href = '../en/';
        });

        langFa.addEventListener('click', () => {
            window.location.href = '../fa/';
        });
    </script>
