    <script>
        // News Ticker Logic
        document.addEventListener('DOMContentLoaded', function() {
            var newsItems = [
                "کارخانه جدید تولید مکمل‌های راموفارمین؛ گامی تازه در توسعه تولید — راموفارمین ظرفیت تولید مکمل‌های سلامت‌محور را توسعه داد",
                "بیانیه خشت دژ ایلیا درباره مزایده شفا دارو — گروه سرمایه‌گذاری خشت دژ ایلیا شفاف‌سازی‌هایی درباره مزایده شرکت سرمایه‌گذاری شفا دارو ارائه کرده است",
                "صنعت ما دچار «ریسک مقیاس» است! — گفت‌وگو با مدیرعامل راموفارمین درباره چالش‌های صنعت دارو و مسیر تحول شرکت",
                "پویش آزادسازی بانوان زندانی — اقدام انسان‌دوستانه راموفارمین برای آزادی مادران زندانی و سرپرست خانواده",
                "گزارش تحول ساختاری و راهبردی راموفارمین — گزارشی از اصلاحات ساختاری، مدیریتی و زیرساختی پس از خصوصی‌سازی شرکت"
            ];
            var ticker = document.getElementById('news-ticker-text');
            var idx = 0;
            function showNextNews() {
                ticker.style.opacity = 0;
                setTimeout(function() {
                    ticker.textContent = newsItems[idx];
                    ticker.style.opacity = 1;
                    idx = (idx + 1) % newsItems.length;
                }, 400);
            }
            showNextNews();
            setInterval(showNextNews, 3400);
        });
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }

        // Mobile Menu Logic
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        let isMenuOpen = false;
        const closeMobileMenu = () => {
            isMenuOpen = false;
            mobileMenu.classList.add('translate-x-full');
            mobileMenuBtn.innerHTML = '<i data-lucide="menu" class="w-8 h-8"></i>';
            document.body.classList.remove('mobile-menu-open');
            if (typeof lucide !== 'undefined') lucide.createIcons();
        };
        const openMobileMenu = () => {
            isMenuOpen = true;
            mobileMenu.classList.remove('translate-x-full');
            mobileMenuBtn.innerHTML = '<i data-lucide="x" class="w-8 h-8"></i>';
            document.body.classList.add('mobile-menu-open');
            if (typeof lucide !== 'undefined') lucide.createIcons();
        };

        if(mobileMenuBtn && mobileMenu) {
            mobileMenuBtn.addEventListener('click', () => {
                isMenuOpen ? closeMobileMenu() : openMobileMenu();
            });
            mobileMenu.querySelectorAll('a').forEach((a) => a.addEventListener('click', closeMobileMenu));
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && isMenuOpen) closeMobileMenu();
            });
        }

        window.toggleMobileSubmenu = function(id) {
            const submenu = document.getElementById(id);
            const icon = document.getElementById('icon-' + id);
            if(submenu.classList.contains('hidden')) {
                submenu.classList.remove('hidden');
                submenu.classList.add('flex');
                icon.style.transform = 'rotate(180deg)';
            } else {
                submenu.classList.add('hidden');
                submenu.classList.remove('flex');
                icon.style.transform = 'rotate(0deg)';
            }
        }

    </script>
