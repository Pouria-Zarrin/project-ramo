<section class="product-hero" dir="rtl" aria-labelledby="anti-diabetes-title">
  <header class="hero-wrap">

  </header>

  <!-- Search Bar -->
  <div class="search-bar" role="search" aria-label="جستجوی محصولات">
    <input id="productSearch" type="search" placeholder="جستجوی محصولات…" aria-label="جستجو">

<section class="product-grid" dir="rtl" id="productGrid">

  <!-- رپاگلیناید 0.5 -->

    <div class="card-body">
      <h3>قرص رپاگلیناید ۰/۵</h3>

    </div>
    <a href="#" class="product-btn" aria-label="اطلاعات بیشتر درباره رپاگلیناید ۰/۵">اطلاعات بیشتر</a>
  </article>

  <!-- رپاگلیناید 1 -->
  <article class="product-card" data-tags="رپاگلیناید دیابت">
    <div class="card-body">
      <h3>قرص رپاگلیناید ۱</h3>
      <p>کاهش قند خون در دیابت نوع دو.</p>
    </div>
    <a href="#" class="product-btn" aria-label="اطلاعات بیشتر درباره رپاگلیناید ۱">اطلاعات بیشتر</a>
  </article>

</section>

<style>
@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;800&display=swap');

:root{
  --accent:#28206b; --bg:#eff2f3; --border:#d8d8dc;
  --text:#0b0b0c; --muted:#555;
  font-family:"Vazirmatn RD","Vazirmatn",system-ui,-apple-system,"Segoe UI",Roboto,Arial,"Helvetica Neue",sans-serif;
}

/* Page background + hero */
.product-hero{ background:var(--bg); padding:48px 16px 24px; }
.hero-wrap{
  max-width:1200px; margin:0 auto; text-align:center;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
.trust-eyebrow{ font-size:18px; color:var(--accent); font-weight:700; margin-bottom:10px; }
.trust-title{ font-size:clamp(26px,2.6vw,38px); margin:0; font-weight:800; color:#111; }
.trust-line{ width:70px; height:3px; background:var(--accent); border-radius:4px; margin:16px auto 18px; }
.hero-sub{ color:#5b5b5b; margin:0; max-width:760px; line-height:1.9; }

/* Search bar — with extra top padding */
.search-bar{
  background:var(--bg);
  padding:24px 16px 8px;
}
.search-bar input{
  width:100%; max-width:700px; display:block; margin:0 auto;
  background:#fff; color:var(--text);
  border:1px solid var(--border); border-radius:12px;
  padding:12px 16px; font-size:15px;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
}

/* Grid + cards */
.product-grid{
  background:var(--bg);
  display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:18px; max-width:1200px; margin:20px auto 48px; padding:0 16px;
}

/* Equal-height cards with bottom-aligned buttons */
.product-card{
  background:#fff; border:1px solid var(--border); border-radius:14px;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
  padding:18px; direction:rtl;
  display:flex; flex-direction:column; justify-content:space-between;
  transition:transform .25s ease, box-shadow .25s ease;
  min-height:184px; /* reduced by ~20% */
}
.product-card:hover{ transform:translateY(-4px); box-shadow:0 10px 24px rgba(0,0,0,.10); }
.product-card .card-body{ display:flex; flex-direction:column; gap:8px; }
.product-card h3{ font-size:18px; font-weight:800; color:var(--accent); margin:0; line-height:1.5; }
.product-card p{ font-size:14px; color:var(--muted); line-height:1.9; margin:0; }

/* Primary button — aligned at bottom */
.product-btn{
  align-self:center;
  display:inline-block; background:var(--accent); color:#fff;
  padding:8px 18px; border-radius:8px; font-weight:700; font-size:13.5px;
  text-decoration:none; transition:background .25s ease, transform .25s ease;
  margin-top:14px;
}
.product-btn:hover{ background:#14104a; transform:translateY(-2px); }

/* Responsive polish */
@media (max-width:640px){
  .hero-sub{ font-size:14px; }
}
</style>

<script>
/* Simple client-side search (title + text + data-tags) */
(function(){
  const input = document.getElementById('productSearch');
  const grid  = document.getElementById('productGrid');
  if(!input || !grid) return;
  input.addEventListener('input', function(){
    const q = this.value.trim().toLowerCase();
    grid.querySelectorAll('.product-card').forEach(card=>{
      const t = card.querySelector('h3')?.innerText.toLowerCase() || '';
      const p = card.querySelector('p')?.innerText.toLowerCase() || '';
      const tags = (card.getAttribute('data-tags')||'').toLowerCase();
      const show = !q || t.includes(q) || p.includes(q) || tags.includes(q);
      card.style.display = show ? '' : 'none';
    });
  });
})();
</script>
